name: Update bibleon

# 수영로교회 "말씀:ON"(메세지:ON, 3분 설교요약) 목록을 주 1회 긁어
# public/data/bibleon.json 을 자동 갱신한다. 변경분이 있을 때만 커밋 →
# main 푸시 → Vercel 자동 재배포로 이어진다. 수동 실행(workflow_dispatch)도 가능.
on:
  schedule:
    - cron: '0 3 * * 1' # 매주 월요일 03:00 UTC (= 한국 12:00 KST)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-bibleon
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Scrape bibleon
        run: node scripts/scrape-bibleon.mjs

      - name: Commit changes if any
        run: |
          if [ -n "$(git status --porcelain public/data/bibleon.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/data/bibleon.json
            git commit -m "chore(bibleon): 말씀:ON 목록 자동 갱신"
            git push
            echo "말씀:ON 변경분 커밋 완료"
          else
            echo "변경 없음 — 커밋 생략"
          fi
