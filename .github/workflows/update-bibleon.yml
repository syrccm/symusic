name: Update bibleon

# 수영로교회 "말씀:ON"(메세지:ON, 3분 설교요약) 목록 + 말씀나눔지(PDF)를
# 주 2회(금/일) 긁어 public/data 를 자동 갱신한다. 어느 요일에 돌든 한 잡에서
# bibleon(영상) → sermon-notes(나눔지) 순서로 풀 실행하므로 bibleon.json 매핑이
# 항상 온전하게 복원된다. (금요일: 나눔지 선반영 / 일요일: 새 영상 반영·매핑 완성)
# 변경분이 있을 때만 커밋 → main 푸시 → Vercel 자동 재배포. 수동 실행도 가능.
on:
  schedule:
    - cron: '0 9 * * 5' # 매주 금요일 09:00 UTC (= 금요일 18:00 KST)
    - cron: '0 9 * * 0' # 매주 일요일 09:00 UTC (= 일요일 18:00 KST)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-bibleon
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # 순서 중요: 영상 목록 갱신 → 나눔지 미러링+매핑+만료정리
      - name: Scrape bibleon
        run: node scripts/scrape-bibleon.mjs

      - name: Scrape & mirror sermon notes
        run: node scripts/scrape-sermon-notes.mjs

      # 말씀나눔지 PDF → 텍스트 JSON(사랑방용). 신규 PDF만 보정 생성, 고아 JSON·index 자동 정리.
      # 실패해도(키 누락·API 한도·새 레이아웃) 잡을 멈추지 않음 → PDF 미러링 커밋은 항상 보장.
      - name: Build note text JSON
        run: node scripts/build-note-json.mjs
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit changes if any
        run: |
          # notes/ PDF 추가·삭제까지 포함해 public/data 전체 변경분을 스테이징
          git add -A public/data
          if [ -n "$(git status --porcelain public/data)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore(bibleon): 말씀:ON 목록·말씀나눔지 자동 갱신"
            git push
            echo "말씀:ON/말씀나눔지 변경분 커밋 완료"
          else
            echo "변경 없음 — 커밋 생략"
          fi
