name: Update ministers

# 수영로교회 교역자/장로 명단을 주 1회 긁어 public/data 를 자동 갱신한다.
# 변경분이 있을 때만 커밋 → main 푸시 → Vercel/Pages 자동 재배포로 이어진다.
# 수동 실행도 가능(workflow_dispatch).
on:
  schedule:
    - cron: '0 9 * * 1' # 매주 월요일 09:00 UTC (= 한국 18:00)
  workflow_dispatch:

permissions:
  contents: write

# 동시 실행 방지
concurrency:
  group: update-ministers
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Scrape ministers
        run: node scripts/scrape-ministers.mjs

      - name: Commit changes if any
        run: |
          if [ -n "$(git status --porcelain public/data)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/data
            git commit -m "chore(ministers): 교역자 명단 자동 갱신"
            git push
            echo "교역자 명단 변경분 커밋 완료"
          else
            echo "변경 없음 — 커밋 생략"
          fi
