<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>정밀 조율기</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="조율기">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1612">
<meta name="format-detection" content="telephone=no">

<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%231a1612'/><text x='90' y='105' text-anchor='middle' dominant-baseline='central' font-size='100' fill='%23d4a574' font-family='serif' font-weight='bold'>♪</text><text x='90' y='158' text-anchor='middle' font-size='20' fill='%23f4ecd8' font-family='sans-serif' font-weight='700' letter-spacing='2'>TUNER</text></svg>">
<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%231a1612'/><text x='90' y='95' text-anchor='middle' dominant-baseline='central' font-size='100' fill='%23d4a574' font-family='serif' font-weight='bold'>♪</text></svg>">

<style>
  :root {
    --bg: #1a1612;
    --bg-soft: #252019;
    --bg-card: #2d2720;
    --ink: #f4ecd8;
    --ink-soft: #bfb39a;
    --ink-dim: #7a7060;
    --accent: #d4a574;
    --accent-hot: #e89b4a;
    --border: #3d362c;
    --low: #6ba3d6;     /* 낮음 — 파랑 */
    --ok: #7bcf9b;      /* 정확 — 초록 */
    --high: #e0806f;    /* 높음 — 빨강 */
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    line-height: 1.5;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-user-select: none;
    user-select: none;
  }

  body {
    background:
      radial-gradient(ellipse at top left, rgba(212, 165, 116, 0.08), transparent 50%),
      radial-gradient(ellipse at bottom right, rgba(143, 179, 160, 0.06), transparent 50%),
      var(--bg);
    padding-top: env(safe-area-inset-top, 0px);
    padding-bottom: env(safe-area-inset-bottom, 0px);
    padding-left: env(safe-area-inset-left, 0px);
    padding-right: env(safe-area-inset-right, 0px);
  }

  .container {
    max-width: 560px;
    margin: 0 auto;
    padding: 0.75rem 1rem 2rem;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.5rem 0 0.9rem;
    margin-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }

  .topbar-title {
    display: flex;
    align-items: center;
    gap: 0.55rem;
  }

  .topbar-icon { font-size: 1.6rem; color: var(--accent); line-height: 1; }

  .topbar-title h1 {
    font-family: "Apple SD Gothic Neo", "Nanum Myeongjo", serif;
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .topbar-title h1 em { font-style: normal; color: var(--accent); }

  .close-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--ink);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    cursor: pointer;
    font-family: inherit;
    font-size: 1.05rem;
    line-height: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, color 0.15s;
  }
  .close-btn:hover, .close-btn:active { background: var(--bg-card); color: var(--accent); }

  /* 시작 화면 */
  .start-screen {
    text-align: center;
    padding: 2.5rem 1rem;
  }
  .start-screen p {
    color: var(--ink-soft);
    font-size: 0.95rem;
    margin-bottom: 1.8rem;
  }
  .mic-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 1.1rem 2.2rem;
    font-size: 1.2rem;
    font-weight: 700;
    border-radius: 50px;
    cursor: pointer;
    font-family: inherit;
    box-shadow: 0 8px 28px rgba(212, 165, 116, 0.28);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  .mic-btn:active { transform: scale(0.96); box-shadow: 0 4px 14px rgba(212, 165, 116, 0.22); }

  .mic-error {
    display: none;
    margin-top: 1.6rem;
    background: var(--bg-card);
    border: 1px solid var(--high);
    color: var(--ink);
    border-radius: 8px;
    padding: 1rem;
    font-size: 0.88rem;
    text-align: left;
    line-height: 1.7;
  }
  .mic-error b { color: var(--high); }

  /* 조율 화면 */
  .tuner-screen { display: none; }

  .ref-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.9rem;
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 0.9rem;
    margin-bottom: 1.1rem;
  }
  .ref-bar .ref-label {
    font-size: 0.78rem;
    color: var(--ink-soft);
    letter-spacing: 0.04em;
  }
  .ref-bar .ref-val {
    font-family: "SF Mono", Menlo, monospace;
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
    min-width: 4.6rem;
    text-align: center;
  }
  .ref-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--ink);
    width: 34px;
    height: 34px;
    border-radius: 50%;
    font-size: 1.15rem;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    line-height: 1;
  }
  .ref-btn:active { background: var(--border); }

  /* 음이름 + cents */
  .note-display { text-align: center; margin-bottom: 0.25rem; }
  .note-name {
    font-family: "SF Mono", Menlo, monospace;
    font-size: 4.6rem;
    font-weight: 800;
    line-height: 1;
    letter-spacing: 0.02em;
    transition: color 0.18s ease;
    color: var(--ink-dim);
  }
  .note-name .oct { font-size: 2.4rem; opacity: 0.7; }
  .note-sub {
    font-size: 0.86rem;
    color: var(--ink-soft);
    margin-top: 0.35rem;
    min-height: 1.2em;
  }

  .cents-text {
    text-align: center;
    font-size: 1.05rem;
    font-weight: 700;
    margin: 0.5rem 0 0.2rem;
    min-height: 1.5em;
    transition: color 0.18s ease;
    color: var(--ink-dim);
  }
  .cents-hint {
    text-align: center;
    font-size: 0.82rem;
    color: var(--ink-soft);
    min-height: 1.2em;
    margin-bottom: 0.4rem;
  }

  /* 게이지 */
  .gauge-wrap { position: relative; width: 100%; max-width: 380px; margin: 0 auto 0.4rem; }
  .gauge-wrap svg { width: 100%; height: auto; display: block; }
  .gauge-labels {
    display: flex;
    justify-content: space-between;
    padding: 0 6%;
    margin-top: -0.4rem;
    font-size: 0.74rem;
    color: var(--ink-soft);
    letter-spacing: 0.05em;
  }
  .gauge-labels .mid { color: var(--ok); font-weight: 700; }
  #needle { transition: none; }

  /* 6줄 카드 */
  .strings {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 0.45rem;
    margin-top: 1.2rem;
  }
  .str-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 0.2rem;
    text-align: center;
    touch-action: manipulation;   /* iOS 탭 지연(~300ms) 제거, 더블탭 줌 방지 */
    transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
  }
  .str-card .sc-num {
    font-size: 0.66rem;
    color: var(--ink-dim);
    letter-spacing: 0.05em;
  }
  .str-card .sc-note {
    font-family: "SF Mono", Menlo, monospace;
    font-size: 1.15rem;
    font-weight: 800;
    margin-top: 0.15rem;
  }
  .str-card.active {
    border-color: var(--accent);
    background: var(--bg-soft);
    transform: translateY(-3px);
  }
  .str-card.in-tune {
    border-color: var(--ok);
    background: rgba(123, 207, 155, 0.16);
  }
  .str-card.in-tune .sc-note { color: var(--ok); }

  .footer { text-align: center; margin-top: 1.8rem; }
  .footer-close {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--ink-soft);
    padding: 0.65rem 1.8rem;
    font-size: 0.92rem;
    border-radius: 50px;
    cursor: pointer;
    font-family: inherit;
  }
  .footer-close:active { background: var(--bg-card); color: var(--accent); }

  .signal-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--ink-dim);
    margin-right: 0.4rem;
    vertical-align: middle;
    transition: background 0.15s ease;
  }
  .signal-dot.live { background: var(--ok); box-shadow: 0 0 8px var(--ok); }

  @media (max-width: 360px) {
    .note-name { font-size: 3.8rem; }
    .note-name .oct { font-size: 2rem; }
    .str-card .sc-note { font-size: 1rem; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="topbar">
    <div class="topbar-title">
      <span class="topbar-icon">♪</span>
      <h1>정밀 <em>조율기</em></h1>
    </div>
    <button class="close-btn" id="topClose" aria-label="닫기">✕</button>
  </div>

  <!-- 시작 화면 -->
  <div class="start-screen" id="startScreen">
    <p>마이크로 기타 소리를 듣고<br>6줄을 정밀하게 맞춰 드립니다.</p>
    <button class="mic-btn" id="micBtn">🎤 조율 시작</button>
    <div class="mic-error" id="micError">
      <b>마이크를 사용할 수 없습니다.</b><br>
      브라우저 설정에서 이 페이지의 마이크 권한을 허용한 뒤
      다시 <b>조율 시작</b>을 눌러 주세요.<br>
      (iPhone은 설정 → Safari → 마이크 확인)
    </div>
  </div>

  <!-- 조율 화면 -->
  <div class="tuner-screen" id="tunerScreen">

    <div class="ref-bar">
      <span class="ref-label"><span class="signal-dot" id="sigDot"></span>기준음 A</span>
      <button class="ref-btn" id="refDown">−</button>
      <span class="ref-val" id="refVal">440 Hz</span>
      <button class="ref-btn" id="refUp">+</button>
    </div>

    <div class="note-display">
      <div class="note-name" id="noteName">—</div>
      <div class="note-sub" id="noteSub">소리를 입력하세요</div>
    </div>

    <div class="cents-text" id="centsText">&nbsp;</div>
    <div class="cents-hint" id="centsHint">&nbsp;</div>

    <div class="gauge-wrap">
      <svg viewBox="0 0 300 175" aria-hidden="true">
        <!-- 트랙 -->
        <path d="M 36 150 A 114 114 0 0 1 264 150" fill="none" stroke="#3d362c" stroke-width="10" stroke-linecap="round"/>
        <!-- 컬러 존: 낮음(파랑) -->
        <path d="M 36 150 A 114 114 0 0 1 116 52" fill="none" stroke="#6ba3d6" stroke-width="10" stroke-linecap="round" opacity="0.55"/>
        <!-- 정확(초록) -->
        <path d="M 122 47 A 114 114 0 0 1 178 47" fill="none" stroke="#7bcf9b" stroke-width="10" stroke-linecap="round"/>
        <!-- 높음(빨강) -->
        <path d="M 184 52 A 114 114 0 0 1 264 150" fill="none" stroke="#e0806f" stroke-width="10" stroke-linecap="round" opacity="0.55"/>
        <!-- 눈금 -->
        <g stroke="#7a7060" stroke-width="2">
          <line x1="150" y1="36" x2="150" y2="50"/>
          <line x1="79" y1="64" x2="88" y2="75"/>
          <line x1="221" y1="64" x2="212" y2="75"/>
        </g>
        <!-- 바늘 -->
        <g id="needle" transform="rotate(0 150 150)">
          <line x1="150" y1="150" x2="150" y2="42" stroke="#7a7060" stroke-width="4" stroke-linecap="round"/>
          <circle cx="150" cy="150" r="9" fill="#7a7060"/>
        </g>
        <circle cx="150" cy="150" r="4" fill="#1a1612"/>
      </svg>
      <div class="gauge-labels">
        <span>낮음 ♭</span>
        <span class="mid">정확</span>
        <span>♯ 높음</span>
      </div>
    </div>

    <div class="strings" id="strings"></div>

    <div class="footer">
      <button class="footer-close" id="footClose">닫기</button>
    </div>
  </div>

</div>

<script>
"use strict";

/* ============================================================
   기타 표준 조율 (A4=440 기준). refA 로 비례 스케일.
   ============================================================ */
var STRINGS = [
  { num: 6, note: "E", oct: 2, base: 82.4069 },
  { num: 5, note: "A", oct: 2, base: 110.0000 },
  { num: 4, note: "D", oct: 3, base: 146.8324 },
  { num: 3, note: "G", oct: 3, base: 195.9977 },
  { num: 2, note: "B", oct: 3, base: 246.9417 },
  { num: 1, note: "E", oct: 4, base: 329.6276 }
];

var state = {
  refA: 440,
  running: false,
  starting: false,
  audioCtx: null,
  analyser: null,
  micStream: null,
  timeBuf: null,
  freqBuf: null,
  rafId: 0,
  lastDetect: 0,
  noiseFloor: 0.005,
  prevRms: 0,
  onsetCool: 0,         // 어택 직후 무시 프레임 카운터
  hist5: [],            // 피치 안정화용 (중앙값 5프레임)
  hist8: [],            // 가중평균 스무딩용 (8프레임)
  needleCur: 0,         // 현재 바늘 각도 (deg)
  needleTgt: 0,         // 목표 바늘 각도
  displayFreq: 0,
  lostFrames: 0,
  activeString: -1      // -1 = 자동 감지, 0~5 = 수동 선택된 줄
};

/* ---------- DOM ---------- */
var $ = function (id) { return document.getElementById(id); };
var elNote = $("noteName"), elSub = $("noteSub"), elCents = $("centsText"),
    elHint = $("centsHint"), elNeedle = $("needle"), elRefVal = $("refVal"),
    elStrings = $("strings"), elSig = $("sigDot");

/* ---------- 6줄 카드 생성 ---------- */
function buildStringCards() {
  elStrings.innerHTML = "";
  STRINGS.forEach(function (s, i) {
    var d = document.createElement("div");
    d.className = "str-card";
    d.dataset.idx = i;
    d.style.cursor = "pointer";
    d.innerHTML = '<div class="sc-num">' + s.num + '번</div>' +
                  '<div class="sc-note">' + s.note + s.oct + '</div>';
    bindTap(d, function () { selectString(i); });   // 수동 선택
    elStrings.appendChild(d);
  });
}

/* 줄 카드 수동 선택 — 같은 카드 재클릭 시 자동 감지로 복귀 */
function selectString(i) {
  state.activeString = (state.activeString === i) ? -1 : i;
  if (state.activeString >= 0) {
    var s = STRINGS[state.activeString];
    elNote.innerHTML = s.note + '<span class="oct">' + s.oct + '</span>';
    elNote.style.color = "var(--ink-soft)";
    elSub.textContent = s.num + "번 줄 선택됨 · 이 줄을 퉁기세요";
    elCents.innerHTML = "&nbsp;"; elCents.style.color = "var(--ink-dim)";
    elHint.innerHTML = "&nbsp;";
    state.needleTgt = 0;
    refreshCardHighlight();
  } else {
    showIdle();   // 자동 모드 복귀
  }
}

/* 수동 선택 카드 강조 (신호 없을 때도 유지) */
function refreshCardHighlight() {
  var cards = elStrings.children;
  for (var i = 0; i < cards.length; i++) {
    cards[i].classList.remove("active", "in-tune");
    if (state.activeString >= 0 && i === state.activeString)
      cards[i].classList.add("active");
  }
}
function stringFreq(i) { return STRINGS[i].base * state.refA / 440; }

/* ============================================================
   1) YIN 알고리즘 — 핵심 피치 감지
   ============================================================ */
function yin(buf, sr, threshold, tauMin, tauMax) {
  var N = buf.length;
  var half = Math.min(N >> 1, 3072);          // 적분 윈도 상한 (CPU 보호)
  tauMax = Math.min(tauMax, (N >> 1) - 1);
  if (tauMax <= tauMin + 2) return { freq: -1, prob: 0 };

  var diff = new Float32Array(tauMax + 1);
  var tau, i, delta, sum;
  for (tau = tauMin; tau <= tauMax; tau++) {
    sum = 0;
    for (i = 0; i < half; i++) {
      delta = buf[i] - buf[i + tau];
      sum += delta * delta;
    }
    diff[tau] = sum;
  }

  // 누적 평균 정규화 차이 (CMND)
  var cmnd = new Float32Array(tauMax + 1);
  cmnd[tauMin] = 1;
  var running = 0;
  for (tau = tauMin + 1; tau <= tauMax; tau++) {
    running += diff[tau];
    cmnd[tau] = running > 0 ? diff[tau] * (tau - tauMin) / running : 1;
  }

  // 절대 임계값 — 임계 미만 첫 골(local min)
  var tauEst = -1;
  for (tau = tauMin + 1; tau <= tauMax; tau++) {
    if (cmnd[tau] < threshold) {
      while (tau + 1 <= tauMax && cmnd[tau + 1] < cmnd[tau]) tau++;
      tauEst = tau;
      break;
    }
  }
  if (tauEst === -1) {
    // 임계 미달 → 전역 최소 (신뢰도 낮으면 폐기)
    var mv = Infinity, mt = -1;
    for (tau = tauMin + 1; tau <= tauMax; tau++)
      if (cmnd[tau] < mv) { mv = cmnd[tau]; mt = tau; }
    if (mv > 0.6 || mt < 0) return { freq: -1, prob: 0 };
    tauEst = mt;
  }

  var better = parabolic(cmnd, tauEst, tauMin, tauMax);
  return { freq: sr / better, prob: 1 - Math.min(1, cmnd[tauEst]) };
}

/* ============================================================
   2) MPM (McLeod Pitch Method) — NSDF 기반, YIN 교차검증
   ============================================================ */
function mpm(buf, sr, tauMin, tauMax) {
  var N = buf.length;
  var W = Math.min(N >> 1, 3072);
  tauMax = Math.min(tauMax, (N >> 1) - 1);
  if (tauMax <= tauMin + 2) return { freq: -1, prob: 0 };

  var nsdf = new Float32Array(tauMax + 1);
  var tau, i, ac, m, a, b;
  for (tau = tauMin; tau <= tauMax; tau++) {
    ac = 0; m = 0;
    for (i = 0; i < W; i++) {
      a = buf[i]; b = buf[i + tau];
      ac += a * b;
      m += a * a + b * b;
    }
    nsdf[tau] = m > 0 ? 2 * ac / m : 0;
  }

  // 첫 양의 영교차 이후 최고 피크
  var pos = false, bestTau = -1, bestVal = -1;
  for (tau = tauMin + 1; tau < tauMax; tau++) {
    if (!pos) { if (nsdf[tau] > 0) pos = true; continue; }
    if (nsdf[tau] > nsdf[tau - 1] && nsdf[tau] >= nsdf[tau + 1]) {
      if (nsdf[tau] > bestVal) { bestVal = nsdf[tau]; bestTau = tau; }
      // 충분히 강한 피크면 (0.9 * 첫 피크) 조기 채택은 생략, 전체 비교
    }
  }
  if (bestTau < 0 || bestVal < 0.45) return { freq: -1, prob: 0 };

  var better = parabolic(nsdf, bestTau, tauMin, tauMax);
  return { freq: sr / better, prob: bestVal };
}

/* 포물선 보간 (서브샘플 정밀도) */
function parabolic(arr, x, lo, hi) {
  if (x <= lo || x >= hi) return x;
  var s0 = arr[x - 1], s1 = arr[x], s2 = arr[x + 1];
  var denom = s0 + s2 - 2 * s1;
  if (denom === 0) return x;
  return x + 0.5 * (s0 - s2) / denom;
}

/* ============================================================
   3) HPS (Harmonic Product Spectrum) — 4차 배음까지
   ============================================================ */
function hps(mag, sr, fftSize) {
  var binHz = sr / fftSize;
  var loBin = Math.max(2, Math.floor(60 / binHz));
  var hiBin = Math.min(mag.length >> 2, Math.ceil(1500 / binHz));
  if (hiBin <= loBin) return -1;

  var bestBin = -1, bestVal = -1;
  for (var b = loBin; b <= hiBin; b++) {
    var p = mag[b];
    p *= mag[b * 2] || 1e-9;
    p *= mag[b * 3] || 1e-9;
    p *= mag[b * 4] || 1e-9;
    if (p > bestVal) { bestVal = p; bestBin = b; }
  }
  if (bestBin < 0) return -1;
  // 피크 주변 포물선 보간
  var y0 = mag[bestBin - 1] || 0, y1 = mag[bestBin], y2 = mag[bestBin + 1] || 0;
  var dn = y0 + y2 - 2 * y1, off = dn !== 0 ? 0.5 * (y0 - y2) / dn : 0;
  return (bestBin + off) * binHz;
}

/* ============================================================
   5) 서브하모닉 / 옥타브 보정 — HPS 기준으로 교정
   ============================================================ */
function octaveCorrect(f, h) {
  if (h <= 0) return f;
  for (var k = 0; k < 3; k++) {
    if (Math.abs(f * 2 - h) / h < 0.06) f *= 2;          // f가 진짜의 1/2 (서브하모닉)
    else if (Math.abs(f - h * 2) / (h * 2) < 0.06) f /= 2;// f가 진짜의 2배
    else break;
  }
  return f;
}

/* 최근 N 샘플 윈도 추출 (동적 버퍼) */
function lastWindow(buf, n) {
  n = Math.min(n, buf.length);
  return buf.subarray(buf.length - n);
}

/* ============================================================
   4) + 6) 3중 교차검증 & 동적 버퍼 크기 선택
   ============================================================ */
function detectPitch() {
  var sr = state.audioCtx.sampleRate;
  var tBuf = state.timeBuf, fBuf = state.freqBuf;
  state.analyser.getFloatTimeDomainData(tBuf);

  /* 8) RMS 신호 감지 + 9) 적응형 임계값 */
  var rms = 0, i;
  for (i = 0; i < tBuf.length; i++) rms += tBuf[i] * tBuf[i];
  rms = Math.sqrt(rms / tBuf.length);

  if (rms < 0.045)  // 조용할 때만 소음 바닥 학습
    state.noiseFloor = state.noiseFloor * 0.95 + rms * 0.05;
  var gate = Math.max(0.02, state.noiseFloor * 4);

  // 어택 감지: RMS 급상승 시 몇 프레임 무시 (10)
  if (rms > state.prevRms * 2.3 && rms > gate) state.onsetCool = 2;
  var attack = state.onsetCool > 0;
  if (attack) state.onsetCool--;
  state.prevRms = rms;

  if (rms < gate) return null;     // 잡음 → 완전 무시

  // 코어스 추정 (빠른 2048 윈도) → 옥타브 결정
  var coarseWin = lastWindow(tBuf, 2048);
  var c = yin(coarseWin, sr, 0.15,
              Math.floor(sr / 700), Math.ceil(sr / 60));
  if (c.freq <= 0) return null;

  // 동적 버퍼: 저음 8192 / 중음 4096 / 고음 2048
  var size;
  if (c.freq < 130)      size = 8192;
  else if (c.freq < 220) size = 4096;
  else                   size = 2048;
  var win = lastWindow(tBuf, size);

  var tauMin = Math.floor(sr / 1500);
  var tauMax = Math.ceil(sr / 55);

  var y = yin(win, sr, 0.10, tauMin, tauMax);          // 1) YIN
  var m = mpm(win, sr, tauMin, tauMax);                // 2) MPM

  state.analyser.getFloatFrequencyData(fBuf);
  var mag = state.magBuf;
  for (i = 0; i < fBuf.length; i++) mag[i] = Math.pow(10, fBuf[i] / 20);
  var h = hps(mag, sr, state.analyser.fftSize);        // 3) HPS

  // 3중 교차검증
  var f = -1;
  if (y.freq > 0 && m.freq > 0 &&
      Math.abs(y.freq - m.freq) / m.freq < 0.03) {
    f = (y.freq + m.freq) / 2;                         // YIN+MPM 일치 → 평균
  } else if (y.freq > 0 && y.prob > 0.86) {
    f = y.freq;
  } else if (m.freq > 0 && m.prob > 0.8) {
    f = m.freq;
  } else if (y.freq > 0) {
    f = y.freq;
  } else if (h > 0) {
    f = h;
  } else {
    return null;
  }

  // 5) 서브하모닉 필터 (E2→E1 등 옥타브 오감지 차단)
  f = octaveCorrect(f, h);

  if (f < 55 || f > 1350) return null;                 // 기타 범위 밖
  if (attack) return "attack";                         // 어택 구간 — 표시 보류
  return f;
}

/* ============================================================
   10) 피치 안정화 (중앙값 5) + 11) 지수가중 스무딩 (8)
   ============================================================ */
function stabilize(f) {
  var h5 = state.hist5;
  h5.push(f);
  if (h5.length > 5) h5.shift();
  var sorted = h5.slice().sort(function (a, b) { return a - b; });
  var med = sorted[sorted.length >> 1];

  var h8 = state.hist8;
  h8.push(med);
  if (h8.length > 8) h8.shift();

  // 지수 가중 평균 (최근일수록 큰 가중치)
  var alpha = 0.62, w = 1, sum = 0, wsum = 0;
  for (var k = h8.length - 1; k >= 0; k--) {
    sum += h8[k] * w;
    wsum += w;
    w *= alpha;
  }
  return sum / wsum;
}

/* ---------- 음이름 / cents 계산 ---------- */
function nearestString(f) {
  var best = 0, bestDiff = Infinity;
  for (var i = 0; i < STRINGS.length; i++) {
    var sf = stringFreq(i);
    var c = Math.abs(1200 * Math.log2(f / sf));
    if (c < bestDiff) { bestDiff = c; best = i; }
  }
  var sf2 = stringFreq(best);
  var cents = 1200 * Math.log2(f / sf2);
  return { idx: best, cents: cents };
}

/* ============================================================
   메인 루프
   ============================================================ */
function loop(ts) {
  if (!state.running) return;
  state.rafId = requestAnimationFrame(loop);

  // iframe/탭 전환 등으로 AudioContext가 suspended 되면 무음만 들어와
  // 화면이 멈춘 듯 보임 → 매 프레임 자동 복구
  if (state.audioCtx && state.audioCtx.state === "suspended") {
    state.audioCtx.resume();
  }

  // 피치 감지는 ~22ms 마다 (CPU 절약, 정확도 충분)
  if (ts - state.lastDetect >= 22) {
    state.lastDetect = ts;
    var r = detectPitch();

    if (r === null) {
      state.lostFrames++;
      if (state.lostFrames > 14) {       // 신호 끊김 → 초기화
        state.hist5.length = 0;
        state.hist8.length = 0;
        showIdle();
      }
      elSig.classList.remove("live");
    } else if (r === "attack") {
      elSig.classList.add("live");
    } else {
      state.lostFrames = 0;
      elSig.classList.add("live");
      var sf = stabilize(r);
      state.displayFreq = sf;
      updateDisplay(sf);
    }
  }

  // 바늘 부드럽게 보간 (매 프레임)
  state.needleCur += (state.needleTgt - state.needleCur) * 0.22;
  elNeedle.setAttribute("transform",
    "rotate(" + state.needleCur.toFixed(2) + " 150 150)");
}

function colorFor(cents) {
  if (Math.abs(cents) <= 5) return "var(--ok)";
  return cents < 0 ? "var(--low)" : "var(--high)";
}

function updateDisplay(f) {
  var idx, cents;
  if (state.activeString >= 0) {            // 수동 선택된 줄 기준
    idx = state.activeString;
    cents = 1200 * Math.log2(f / stringFreq(idx));
  } else {                                  // 자동: 가장 가까운 줄
    var ns = nearestString(f);
    idx = ns.idx;
    cents = ns.cents;
  }
  var s = STRINGS[idx];
  var clamped = Math.max(-50, Math.min(50, cents));
  var col = colorFor(cents);

  elNote.innerHTML = s.note + '<span class="oct">' + s.oct + '</span>';
  elNote.style.color = col;
  elSub.textContent = s.num + "번 줄 · " + f.toFixed(1) + " Hz";

  var rounded = Math.round(cents);
  if (Math.abs(cents) <= 5) {
    elCents.textContent = "✓ 정확합니다";
    elCents.style.color = "var(--ok)";
    elHint.innerHTML = "&nbsp;";
  } else if (cents < 0) {
    elCents.textContent = "▼ " + Math.abs(rounded) + " cents 낮음";
    elCents.style.color = "var(--low)";
    elHint.textContent = "줄을 조이세요 (음을 높이세요)";
  } else {
    elCents.textContent = "▲ " + rounded + " cents 높음";
    elCents.style.color = "var(--high)";
    elHint.textContent = "줄을 푸세요 (음을 낮추세요)";
  }

  // 바늘 목표 각도 (±50 cents → ±60°)
  state.needleTgt = (clamped / 50) * 60;

  // 6줄 카드 강조
  var cards = elStrings.children;
  for (var i = 0; i < cards.length; i++) {
    cards[i].classList.remove("active", "in-tune");
    if (i === idx) {
      cards[i].classList.add("active");
      if (Math.abs(cents) <= 5) cards[i].classList.add("in-tune");
    }
  }
}

function showIdle() {
  if (state.activeString >= 0) {        // 수동 선택 유지 (신호 없어도 표시)
    var s = STRINGS[state.activeString];
    elNote.innerHTML = s.note + '<span class="oct">' + s.oct + '</span>';
    elNote.style.color = "var(--ink-soft)";
    elSub.textContent = s.num + "번 줄 선택됨 · 이 줄을 퉁기세요";
    elCents.innerHTML = "&nbsp;";
    elCents.style.color = "var(--ink-dim)";
    elHint.innerHTML = "&nbsp;";
    state.needleTgt = 0;
    refreshCardHighlight();
    return;
  }
  elNote.innerHTML = "—";
  elNote.style.color = "var(--ink-dim)";
  elSub.textContent = "소리를 입력하세요";
  elCents.innerHTML = "&nbsp;";
  elCents.style.color = "var(--ink-dim)";
  elHint.innerHTML = "&nbsp;";
  state.needleTgt = 0;
  var cards = elStrings.children;
  for (var i = 0; i < cards.length; i++)
    cards[i].classList.remove("active", "in-tune");
}

/* ============================================================
   오디오 시작 — 7) Pre-filter + 12) 고역 차단
   ============================================================ */
function startTuner() {
  if (state.running || state.starting) return;        // 중복 실행 방지
  var Ctx = window.AudioContext || window.webkitAudioContext;
  if (!Ctx || !navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    showMicError();
    return;
  }
  // iOS Safari: AudioContext는 사용자 제스처(클릭) 동기 컨텍스트 안에서
  // 생성·resume 해야 함. 비동기 getUserMedia 콜백 뒤에 만들면 suspended 고착.
  if (!state.audioCtx || state.audioCtx.state === "closed") {
    try { state.audioCtx = new Ctx(); }
    catch (e) { showMicError(); return; }
  }
  if (state.audioCtx.state === "suspended") state.audioCtx.resume();

  state.starting = true;
  navigator.mediaDevices.getUserMedia({
    audio: {
      echoCancellation: false,
      noiseSuppression: false,
      autoGainControl: false
    }
  }).then(function (stream) {
    state.starting = false;
    state.micStream = stream;
    var ctx = state.audioCtx;
    if (ctx.state === "suspended") ctx.resume();

    var src = ctx.createMediaStreamSource(stream);

    // 7) Pre-filter: 60Hz~1500Hz 외 차단
    var hp = ctx.createBiquadFilter();
    hp.type = "highpass"; hp.frequency.value = 60; hp.Q.value = 0.7;

    var lp = ctx.createBiquadFilter();
    lp.type = "lowpass"; lp.frequency.value = 1500; lp.Q.value = 0.7;

    // 12) 고역 노이즈 차단: 3kHz 이상 -20dB
    var hs = ctx.createBiquadFilter();
    hs.type = "highshelf"; hs.frequency.value = 3000; hs.gain.value = -20;

    var analyser = ctx.createAnalyser();
    analyser.fftSize = 16384;                 // 시간영역 16384 / 동적 윈도용
    analyser.smoothingTimeConstant = 0.0;     // HPS 반응성
    state.analyser = analyser;

    src.connect(hp);
    hp.connect(lp);
    lp.connect(hs);
    hs.connect(analyser);

    state.timeBuf = new Float32Array(analyser.fftSize);
    state.freqBuf = new Float32Array(analyser.frequencyBinCount);
    state.magBuf  = new Float32Array(analyser.frequencyBinCount);

    state.running = true;
    state.lastDetect = 0;
    $("startScreen").style.display = "none";
    $("tunerScreen").style.display = "block";
    state.rafId = requestAnimationFrame(loop);
  }).catch(function () {
    state.starting = false;
    showMicError();
  });
}

function showMicError() {
  $("micError").style.display = "block";
}

function stopTuner() {
  state.running = false;
  if (state.rafId) cancelAnimationFrame(state.rafId);
  if (state.micStream)
    state.micStream.getTracks().forEach(function (t) { t.stop(); });
  if (state.audioCtx && state.audioCtx.state !== "closed")
    state.audioCtx.close();
}

/* ---------- 닫기 ---------- */
function closeTuner() {
  stopTuner();
  if (window.parent && window.parent !== window) {
    window.parent.postMessage("close-tuner", "*");
  } else if (history.length > 1) {
    history.back();
  } else {
    window.location.href = "/";
  }
}

/* ---------- 기준음 A 조절 (430~450) ---------- */
function setRef(v) {
  state.refA = Math.max(430, Math.min(450, v));
  elRefVal.textContent = state.refA + " Hz";
}

/* ---------- 이벤트 ---------- */
function bindTap(el, fn) {
  el.addEventListener("click", fn);
  el.addEventListener("touchend", function (e) {
    e.preventDefault();
    fn();
  }, { passive: false });
}

$("micBtn").addEventListener("click", startTuner);
bindTap($("topClose"), closeTuner);
bindTap($("footClose"), closeTuner);
bindTap($("refDown"), function () { setRef(state.refA - 1); });
bindTap($("refUp"), function () { setRef(state.refA + 1); });

window.addEventListener("pagehide", stopTuner);
window.addEventListener("beforeunload", stopTuner);

buildStringCards();
setRef(440);
</script>
</body>
