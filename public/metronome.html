<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>메트로놈</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="메트로놈">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a2e">
<meta name="format-detection" content="telephone=no">

<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%231a1a2e'/><text x='90' y='118' text-anchor='middle' font-size='110' fill='%238b5cf6' font-family='serif' font-weight='bold'>♩</text></svg>">

<style>
  :root {
    --bg: #0f0f1e;
    --bg-soft: #1a1a2e;
    --bg-card: #221f3a;
    --ink: #f1f1ff;
    --ink-soft: #b8b3d6;
    --ink-dim: #6e6890;
    --accent: #8b5cf6;
    --accent-hot: #a78bfa;
    --accent-soft: rgba(139, 92, 246, 0.18);
    --border: #2e2a4a;
    --downbeat: #fbbf24;
    --beat: #8b5cf6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    line-height: 1.5;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-user-select: none;
    user-select: none;
  }

  body {
    background:
      radial-gradient(ellipse at top, rgba(139, 92, 246, 0.12), transparent 60%),
      radial-gradient(ellipse at bottom, rgba(167, 139, 250, 0.08), transparent 60%),
      var(--bg);
    padding-top: env(safe-area-inset-top, 0px);
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }

  .wrap {
    max-width: 520px;
    margin: 0 auto;
    padding: 1rem 1.25rem 2rem;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.5rem 0 1rem;
    margin-bottom: 1.25rem;
    border-bottom: 1px solid var(--border);
  }

  .title {
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .title span { color: var(--accent-hot); }

  .closeBtn {
    width: 36px; height: 36px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--ink);
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .closeBtn:active { background: var(--accent-soft); }

  /* 박자 시각화 */
  .beats {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin: 0.5rem 0 1.5rem;
    min-height: 28px;
  }
  .dot {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--bg-card);
    border: 1.5px solid var(--border);
    transition: transform 0.08s ease, background 0.08s ease, border-color 0.08s ease;
  }
  .dot.downbeat { border-color: var(--downbeat); }
  .dot.active {
    background: var(--beat);
    border-color: var(--beat);
    transform: scale(1.35);
  }
  .dot.active.downbeat {
    background: var(--downbeat);
    border-color: var(--downbeat);
  }

  /* BPM 디스플레이 */
  .bpmCard {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 1.25rem 1rem;
    text-align: center;
    margin-bottom: 1.25rem;
  }
  .bpmValue {
    font-size: 4.5rem;
    font-weight: 700;
    color: var(--ink);
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .bpmUnit {
    font-size: 0.85rem;
    color: var(--ink-dim);
    margin-top: 0.25rem;
    letter-spacing: 0.15em;
  }
  .tempoName {
    margin-top: 0.5rem;
    color: var(--accent-hot);
    font-size: 0.95rem;
    font-style: italic;
    min-height: 1.4em;
  }

  /* BPM 컨트롤 */
  .bpmControls {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1rem;
  }
  .stepBtn {
    flex: 0 0 auto;
    width: 48px; height: 48px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--ink);
    font-size: 1.4rem;
    font-weight: 700;
    cursor: pointer;
  }
  .stepBtn:active { background: var(--accent-soft); border-color: var(--accent); }
  .stepBtn.long { width: 56px; font-size: 0.95rem; font-weight: 600; }

  .slider {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 6px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 999px;
    outline: none;
  }
  .slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--accent-hot);
    border: 2px solid var(--bg);
    cursor: pointer;
  }
  .slider::-moz-range-thumb {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--accent-hot);
    border: 2px solid var(--bg);
    cursor: pointer;
  }

  /* 박자표 선택 */
  .section {
    margin-bottom: 1.25rem;
  }
  .sectionLabel {
    font-size: 0.85rem;
    color: var(--ink-dim);
    margin-bottom: 0.5rem;
    letter-spacing: 0.08em;
  }
  .segGroup {
    display: flex;
    gap: 0.5rem;
  }
  .segBtn {
    flex: 1;
    padding: 0.85rem 0;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--ink-soft);
    font-size: 1.05rem;
    font-weight: 600;
    cursor: pointer;
  }
  .segBtn.active {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent-hot);
  }

  /* 시작/정지 */
  .playBtn {
    width: 100%;
    padding: 1.05rem 0;
    border-radius: 16px;
    border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent-hot));
    color: white;
    font-size: 1.15rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.05em;
    box-shadow: 0 6px 20px rgba(139, 92, 246, 0.35);
    transition: transform 0.05s ease, box-shadow 0.15s ease;
  }
  .playBtn:active { transform: scale(0.98); }
  .playBtn.playing {
    background: linear-gradient(135deg, #ef4444, #f97316);
    box-shadow: 0 6px 20px rgba(239, 68, 68, 0.35);
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title">🎹 <span>메트로놈</span></div>
      <button type="button" class="closeBtn" id="closeBtn" aria-label="닫기">✕</button>
    </div>

    <div class="beats" id="beats"></div>

    <div class="bpmCard">
      <div class="bpmValue"><span id="bpmValue">100</span></div>
      <div class="bpmUnit">BPM</div>
      <div class="tempoName" id="tempoName">Andante</div>
    </div>

    <div class="bpmControls">
      <button type="button" class="stepBtn long" id="dec10">−10</button>
      <button type="button" class="stepBtn" id="dec1">−</button>
      <input type="range" class="slider" id="bpmSlider" min="40" max="208" value="100" step="1">
      <button type="button" class="stepBtn" id="inc1">+</button>
      <button type="button" class="stepBtn long" id="inc10">+10</button>
    </div>

    <div class="section">
      <div class="sectionLabel">박자</div>
      <div class="segGroup" id="meterGroup">
        <button type="button" class="segBtn" data-beats="2">2/4</button>
        <button type="button" class="segBtn" data-beats="3">3/4</button>
        <button type="button" class="segBtn active" data-beats="4">4/4</button>
      </div>
    </div>

    <button type="button" class="playBtn" id="playBtn">시작</button>
  </div>

<script>
(function () {
  'use strict';

  const $ = (id) => document.getElementById(id);

  // 상태
  let audioCtx = null;
  let bpm = 100;
  let beatsPerBar = 4;
  let isPlaying = false;
  let currentBeat = 0;
  let nextNoteTime = 0;
  let timerID = null;
  const notesInQueue = [];
  const SCHEDULE_AHEAD = 0.1; // sec
  const LOOKAHEAD = 25; // ms
  let lastDrawnBeat = -1;

  // 빠르기 이름 (관용 구간)
  function tempoLabel(b) {
    if (b < 60) return 'Largo';
    if (b < 76) return 'Adagio';
    if (b < 108) return 'Andante';
    if (b < 120) return 'Moderato';
    if (b < 156) return 'Allegro';
    if (b < 176) return 'Vivace';
    return 'Presto';
  }

  // 박자 점 렌더링
  function renderBeats() {
    const root = $('beats');
    root.innerHTML = '';
    for (let i = 0; i < beatsPerBar; i++) {
      const d = document.createElement('div');
      d.className = 'dot' + (i === 0 ? ' downbeat' : '');
      d.dataset.idx = String(i);
      root.appendChild(d);
    }
    lastDrawnBeat = -1;
  }

  function setBpm(v) {
    bpm = Math.max(40, Math.min(208, Math.round(v)));
    $('bpmValue').textContent = String(bpm);
    $('tempoName').textContent = tempoLabel(bpm);
    if ($('bpmSlider').value !== String(bpm)) $('bpmSlider').value = String(bpm);
  }

  function setBeats(n) {
    beatsPerBar = n;
    document.querySelectorAll('#meterGroup .segBtn').forEach((b) => {
      b.classList.toggle('active', Number(b.dataset.beats) === n);
    });
    currentBeat = 0;
    renderBeats();
  }

  // Web Audio: 짧은 클릭음 (다운비트 = 더 높은 주파수)
  function scheduleClick(beatIndex, time) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = beatIndex === 0 ? 1500 : 1000;
    osc.type = 'square';
    gain.gain.setValueAtTime(0.0001, time);
    gain.gain.exponentialRampToValueAtTime(0.4, time + 0.001);
    gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.05);
    osc.start(time);
    osc.stop(time + 0.06);
    notesInQueue.push({ beat: beatIndex, time });
  }

  function advanceNote() {
    const secondsPerBeat = 60.0 / bpm;
    nextNoteTime += secondsPerBeat;
    currentBeat = (currentBeat + 1) % beatsPerBar;
  }

  function scheduler() {
    if (!audioCtx) return;
    while (nextNoteTime < audioCtx.currentTime + SCHEDULE_AHEAD) {
      scheduleClick(currentBeat, nextNoteTime);
      advanceNote();
    }
  }

  function draw() {
    if (!isPlaying) return;
    const now = audioCtx ? audioCtx.currentTime : 0;
    let visualBeat = lastDrawnBeat;
    while (notesInQueue.length && notesInQueue[0].time <= now) {
      visualBeat = notesInQueue[0].beat;
      notesInQueue.shift();
    }
    if (visualBeat !== lastDrawnBeat) {
      lastDrawnBeat = visualBeat;
      document.querySelectorAll('#beats .dot').forEach((d) => {
        d.classList.toggle('active', Number(d.dataset.idx) === visualBeat);
      });
    }
    requestAnimationFrame(draw);
  }

  function start() {
    if (!audioCtx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AC();
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
    isPlaying = true;
    currentBeat = 0;
    notesInQueue.length = 0;
    lastDrawnBeat = -1;
    nextNoteTime = audioCtx.currentTime + 0.06;
    timerID = setInterval(scheduler, LOOKAHEAD);
    requestAnimationFrame(draw);
    const btn = $('playBtn');
    btn.textContent = '정지';
    btn.classList.add('playing');
  }

  function stop() {
    isPlaying = false;
    if (timerID) {
      clearInterval(timerID);
      timerID = null;
    }
    notesInQueue.length = 0;
    document.querySelectorAll('#beats .dot').forEach((d) => d.classList.remove('active'));
    const btn = $('playBtn');
    btn.textContent = '시작';
    btn.classList.remove('playing');
  }

  function toggle() {
    if (isPlaying) stop();
    else start();
  }

  // 이벤트 바인딩
  $('playBtn').addEventListener('click', toggle);
  $('inc1').addEventListener('click', () => setBpm(bpm + 1));
  $('dec1').addEventListener('click', () => setBpm(bpm - 1));
  $('inc10').addEventListener('click', () => setBpm(bpm + 10));
  $('dec10').addEventListener('click', () => setBpm(bpm - 10));
  $('bpmSlider').addEventListener('input', (e) => setBpm(Number(e.target.value)));
  document.querySelectorAll('#meterGroup .segBtn').forEach((b) => {
    b.addEventListener('click', () => setBeats(Number(b.dataset.beats)));
  });

  function closeMe() {
    stop();
    try { window.parent.postMessage('close-metronome', window.location.origin); } catch (e) {}
  }
  $('closeBtn').addEventListener('click', closeMe);

  // 페이지 벗어날 때 정리
  window.addEventListener('pagehide', stop);
  window.addEventListener('beforeunload', stop);

  // 초기 렌더
  renderBeats();
  setBpm(bpm);
})();
</script>
</body>
</html>
