<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>메트로놈</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="메트로놈">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#14081f">
<meta name="format-detection" content="telephone=no">

<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%233A0D6E'/><text x='90' y='118' text-anchor='middle' font-size='110' fill='%2314b8a6' font-family='serif' font-weight='bold'>♩</text></svg>">

<style>
  :root {
    --bg: #14081f;
    --bg-card: #251042;
    --bg-soft: #1c0c2e;
    --border: #3a1f5e;
    --accent: #4A1290;
    --accent-hot: #6b21a8;
    --accent-deep: #3A0D6E;
    --accent-bright: #a78bfa;
    --accent-soft: rgba(74, 18, 144, 0.28);
    --teal: #14b8a6;
    --teal-hot: #2dd4bf;
    --teal-soft: rgba(20, 184, 166, 0.22);
    --ink: #f1ecff;
    --ink-soft: #c7b8e6;
    --ink-dim: #8071a0;
    --danger: #ef4444;
    /* 시각 플래시 강도 (JS 에서 설정) */
    --flash-opacity: 0.4;
    --flash-scale: 1.2;
    --flash-glow: 15px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    line-height: 1.5;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-user-select: none;
    user-select: none;
  }

  body {
    background:
      radial-gradient(ellipse at top, rgba(74, 18, 144, 0.28), transparent 60%),
      radial-gradient(ellipse at bottom, rgba(20, 184, 166, 0.10), transparent 60%),
      var(--bg);
    padding-top: env(safe-area-inset-top, 0px);
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }

  .wrap {
    max-width: 520px;
    margin: 0 auto;
    padding: 8px 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    position: relative;
    border-radius: 4px;
    background-color: transparent;
    transition: background-color 150ms ease-out;
  }
  .wrap.flash {
    background-color: rgba(255, 255, 255, var(--flash-opacity));
    transition: background-color 0ms;
  }
  .wrap.flash.downbeat-flash {
    background-color: rgba(20, 184, 166, var(--flash-opacity));
  }

  /* 디버그 상태 표시 (좌측 상단, 확인 후 제거 가능) */
  .debugInfo {
    position: absolute;
    top: 10px;
    left: 14px;
    z-index: 6;
    font-size: 9.5px;
    color: var(--ink-dim);
    font-family: ui-monospace, SFMono-Regular, monospace;
    pointer-events: none;
    letter-spacing: 0;
    line-height: 1;
  }

  /* 닫기 (우측 상단 absolute) */
  .closeBtn {
    position: absolute;
    top: 6px;
    right: 8px;
    z-index: 5;
    width: 28px; height: 28px;
    border: 1px solid var(--border);
    background: rgba(37, 16, 66, 0.85);
    color: var(--ink-soft);
    border-radius: 50%;
    font-size: 13px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(6px);
  }
  .closeBtn:active { background: var(--accent-soft); color: var(--ink); }

  /* 박자 시각화 (32px) */
  .beats {
    display: flex;
    flex-wrap: nowrap;
    justify-content: center;
    align-items: center;
    gap: 8px;
    height: 32px;
  }
  .dot {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: transparent;
    border: 2px solid rgba(255, 255, 255, 0.25);
    transition: transform 0.07s ease, background 0.07s ease, border-color 0.07s ease, box-shadow 0.15s ease;
  }
  .dot.downbeat {
    border-color: rgba(255, 255, 255, 0.7);
    border-width: 2.5px;
  }
  .dot.active {
    background: var(--teal);
    border-color: var(--teal);
    box-shadow: 0 0 var(--flash-glow) rgba(20, 184, 166, 0.65);
    transform: scale(var(--flash-scale));
  }
  .dot.active.downbeat {
    background: #ffffff;
    border-color: #ffffff;
    box-shadow: 0 0 var(--flash-glow) rgba(255, 255, 255, 0.75);
  }

  /* BPM 표시 (56px) — 카드 박스 없음 */
  .bpmRow {
    height: 56px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .bpmValue {
    font-size: 44px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1;
    letter-spacing: -0.02em;
    cursor: pointer;
    padding: 0 6px;
    border-radius: 6px;
  }
  .bpmValue:active { background: rgba(255, 255, 255, 0.04); }

  .bpmInput {
    font-size: 44px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1;
    letter-spacing: -0.02em;
    background: transparent;
    border: none;
    outline: none;
    text-align: center;
    width: 4em;
    max-width: 100%;
    font-family: inherit;
    -moz-appearance: textfield;
  }
  .bpmInput::-webkit-outer-spin-button,
  .bpmInput::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

  .bpmMeta {
    margin-top: 3px;
    font-size: 11px;
    color: var(--ink-dim);
    letter-spacing: 0.06em;
    line-height: 1;
  }
  .tempoName {
    color: var(--teal-hot);
    font-style: italic;
    cursor: pointer;
    padding: 1px 6px;
    border-radius: 999px;
    transition: background 0.1s ease;
  }
  .tempoName:active { background: var(--teal-soft); }

  /* BPM 컨트롤 (36px) */
  .bpmControls {
    display: flex;
    align-items: center;
    gap: 6px;
    height: 36px;
  }
  .stepBtn {
    flex: 0 0 auto;
    min-width: 40px; height: 36px;
    padding: 0 0.35rem;
    border-radius: 9px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--ink);
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
  }
  .stepBtn:active { background: var(--accent-soft); border-color: var(--accent); }
  .stepBtn.long { min-width: 46px; font-size: 0.85rem; }

  .slider {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 8px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 999px;
    outline: none;
  }
  .slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--accent-bright);
    border: 2px solid var(--bg);
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
  }
  .slider::-moz-range-thumb {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--accent-bright);
    border: 2px solid var(--bg);
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
  }
  .slider.teal::-webkit-slider-thumb { background: var(--teal-hot); }
  .slider.teal::-moz-range-thumb { background: var(--teal-hot); }

  /* 탭템포 줄 (40px, 3:1) */
  .tapRow {
    display: flex;
    gap: 6px;
    height: 40px;
  }
  .tapBtn {
    flex: 3;
    height: 40px;
    padding: 0;
    border-radius: 9px;
    border: 1px solid rgba(45, 212, 191, 0.55);
    background: rgba(20, 184, 166, 0.16);
    color: var(--teal-hot);
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: transform 0.05s ease, background 0.1s ease;
  }
  .tapBtn:active { transform: scale(0.98); background: rgba(20, 184, 166, 0.28); }
  .tapBtn.flashing {
    background: rgba(20, 184, 166, 0.4);
    color: #ffffff;
    border-color: var(--teal-hot);
  }
  .resetTapBtn {
    flex: 1;
    height: 40px;
    padding: 0 0.5rem;
    border-radius: 9px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--ink-soft);
    font-size: 0.82rem;
    cursor: pointer;
  }
  .resetTapBtn:active { background: var(--accent-soft); color: var(--ink); }

  /* 볼륨 줄 (32px) */
  .volumeRow {
    display: flex;
    align-items: center;
    gap: 8px;
    height: 32px;
  }
  .volumeRow .label {
    flex: 0 0 auto;
    font-size: 0.78rem;
    color: var(--ink-dim);
    width: 2.2rem;
  }
  .volumeRow .pct {
    flex: 0 0 auto;
    font-size: 0.78rem;
    color: var(--ink-soft);
    width: 2.6rem;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* 섹션 (배경/카드 없음, 간격은 .wrap의 gap이 담당) */
  .section { display: contents; }

  /* 세분음/박자 영역 직접 높이 지정 */
  .segGroup {
    display: flex;
    gap: 6px;
    height: 36px;
  }
  .meterGrid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-auto-rows: 36px;
    gap: 4px;
  }
  .segBtn {
    flex: 1;
    height: 100%;
    padding: 0;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--ink-soft);
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
  }
  .segBtn.active {
    background: var(--accent-soft);
    border-color: var(--accent-bright);
    color: var(--ink);
  }
  .segBtn.compact { font-size: 0.88rem; }

  /* 시각 플래시 행 (28px) — 강도 슬라이더 */
  .flashRow {
    display: flex;
    align-items: center;
    height: 28px;
    padding: 0 2px;
    gap: 10px;
  }
  .flashRow .label {
    flex: 0 0 auto;
    font-size: 0.78rem;
    color: var(--ink-dim);
    letter-spacing: 0.04em;
  }
  .flashSlider {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 5px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 999px;
    outline: none;
    margin: 0;
  }
  .flashSlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--teal-hot);
    border: 2px solid var(--bg);
    cursor: pointer;
  }
  .flashSlider::-moz-range-thumb {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--teal-hot);
    border: 2px solid var(--bg);
    cursor: pointer;
  }
  .flashValue {
    flex: 0 0 auto;
    font-size: 0.78rem;
    color: var(--ink-soft);
    font-variant-numeric: tabular-nums;
    width: 1.4em;
    text-align: right;
  }

  /* 시작/정지 (48px) */
  .playBtn {
    width: 100%;
    height: 48px;
    padding: 0;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, var(--teal), var(--teal-hot));
    color: white;
    font-size: 1.05rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.06em;
    box-shadow: 0 4px 14px rgba(20, 184, 166, 0.4);
    transition: transform 0.05s ease, box-shadow 0.15s ease, background 0.15s ease;
    margin-top: 2px;
  }
  .playBtn:active { transform: scale(0.98); }
  .playBtn.playing {
    background: linear-gradient(135deg, #0d8c80, #0f766e);
    box-shadow: 0 4px 16px rgba(13, 140, 128, 0.45);
  }

  /* 탭 (36px) */
  .tabs {
    display: flex;
    gap: 4px;
    height: 36px;
    border-bottom: 1px solid var(--border);
    padding-right: 40px; /* 닫기 버튼 공간 */
  }
  .tab {
    flex: 0 0 auto;
    height: 36px;
    padding: 0 14px;
    background: transparent;
    border: none;
    color: rgba(255, 255, 255, 0.5);
    font-size: 0.92rem;
    font-weight: 600;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.1s ease, border-color 0.1s ease;
  }
  .tab.active {
    color: #ffffff;
    border-bottom-color: var(--teal);
  }
  .tab:active { color: var(--teal-hot); }

  /* 패널 */
  .panel {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .panel[hidden] { display: none; }

  /* 드론 음 */
  .hint {
    font-size: 0.78rem;
    color: var(--ink-dim);
    text-align: center;
    padding: 4px 0;
    height: 24px;
    line-height: 16px;
  }
  .stringGrid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    height: 72px;
  }
  .stringBtn {
    height: 72px;
    border-radius: 12px;
    border: 1px solid var(--accent);
    background: linear-gradient(135deg, var(--accent-deep), var(--accent-hot));
    color: white;
    font-size: 1.7rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: background 0.08s ease, box-shadow 0.1s ease, transform 0.04s ease;
    touch-action: manipulation;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    box-shadow: 0 3px 10px rgba(74, 18, 144, 0.35);
  }
  .stringBtn.playing,
  .stringBtn:active {
    background: linear-gradient(135deg, var(--teal), var(--teal-hot));
    border-color: var(--teal-hot);
    box-shadow: 0 0 22px rgba(20, 184, 166, 0.6);
    transform: scale(0.97);
  }

  @media (max-width: 380px) {
    .meterGrid { gap: 5px; }
    .stepBtn { min-width: 40px; padding: 0 0.2rem; }
    .bpmValue, .bpmInput { font-size: 42px; }
    .stringBtn { font-size: 1.5rem; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <button type="button" class="closeBtn" id="closeBtn" aria-label="닫기">✕</button>
    <div class="debugInfo" id="debugInfo">audio: ?</div>

    <div class="tabs" role="tablist">
      <button type="button" class="tab active" data-tab="metronome" role="tab" aria-selected="true">메트로놈</button>
      <button type="button" class="tab" data-tab="drone" role="tab" aria-selected="false">드론 음</button>
    </div>

    <div class="panel" id="panel-metronome">
    <div class="beats" id="beats"></div>

    <div class="bpmRow" id="bpmCard">
      <span class="bpmValue" id="bpmValue" title="클릭하여 직접 입력">100</span>
      <input type="number" class="bpmInput" id="bpmInput" min="40" max="208" value="100" style="display:none;" />
      <div class="bpmMeta">BPM · <span class="tempoName" id="tempoName" title="클릭하여 해당 빠르기로 이동">Andante</span></div>
    </div>

    <div class="bpmControls">
      <button type="button" class="stepBtn long" id="dec10">−10</button>
      <button type="button" class="stepBtn long" id="dec1">−1</button>
      <input type="range" class="slider" id="bpmSlider" min="40" max="208" value="100" step="1" aria-label="BPM 슬라이더">
      <button type="button" class="stepBtn long" id="inc1">+1</button>
      <button type="button" class="stepBtn long" id="inc10">+10</button>
    </div>

    <div class="tapRow">
      <button type="button" class="tapBtn" id="tapBtn">탭템포 (T)</button>
      <button type="button" class="resetTapBtn" id="resetTapBtn">초기화</button>
    </div>

    <div class="volumeRow">
      <div class="label">볼륨</div>
      <input type="range" class="slider teal" id="volumeSlider" min="0" max="100" value="80" step="1" aria-label="볼륨 슬라이더">
      <div class="pct" id="volumeValue">80%</div>
    </div>

    <div class="segGroup" id="subGroup">
      <button type="button" class="segBtn active" data-sub="1">1박</button>
      <button type="button" class="segBtn" data-sub="2">2분할</button>
      <button type="button" class="segBtn" data-sub="3">3연음</button>
      <button type="button" class="segBtn" data-sub="4">4분할</button>
    </div>

    <div class="meterGrid" id="meterGroup">
      <button type="button" class="segBtn compact" data-meter="2/4">2/4</button>
      <button type="button" class="segBtn compact" data-meter="3/4">3/4</button>
      <button type="button" class="segBtn compact active" data-meter="4/4">4/4</button>
      <button type="button" class="segBtn compact" data-meter="5/4">5/4</button>
      <button type="button" class="segBtn compact" data-meter="6/4">6/4</button>
      <button type="button" class="segBtn compact" data-meter="7/4">7/4</button>
      <button type="button" class="segBtn compact" data-meter="8/4">8/4</button>
      <button type="button" class="segBtn compact" data-meter="6/8">6/8</button>
    </div>

    <div class="flashRow">
      <span class="label">시각 플래시</span>
      <input type="range" class="flashSlider" id="flashSlider" min="0" max="10" value="5" step="1" aria-label="시각 플래시 강도" />
      <span class="flashValue" id="flashValue">5</span>
    </div>

    <button type="button" class="playBtn" id="playBtn">시작</button>
    </div><!-- /panel-metronome -->

    <div class="panel" id="panel-drone" hidden>
      <p class="hint">버튼을 누르는 동안 해당 음이 울립니다</p>

      <div class="stringGrid">
        <button type="button" class="stringBtn" data-string="E">E</button>
        <button type="button" class="stringBtn" data-string="A">A</button>
        <button type="button" class="stringBtn" data-string="D">D</button>
        <button type="button" class="stringBtn" data-string="G">G</button>
      </div>

      <div class="segGroup" id="droneOctave">
        <button type="button" class="segBtn" data-octave="low">낮음</button>
        <button type="button" class="segBtn active" data-octave="mid">보통</button>
        <button type="button" class="segBtn" data-octave="high">높음</button>
      </div>

      <div class="segGroup" id="droneTimbre">
        <button type="button" class="segBtn active" data-timbre="bass">베이스</button>
        <button type="button" class="segBtn" data-timbre="clean">클린</button>
        <button type="button" class="segBtn" data-timbre="warm">따뜻하게</button>
      </div>

      <div class="volumeRow">
        <div class="label">볼륨</div>
        <input type="range" class="slider teal" id="droneVolumeSlider" min="0" max="100" value="100" step="1" aria-label="드론 볼륨">
        <div class="pct" id="droneVolumeValue">100%</div>
      </div>
    </div><!-- /panel-drone -->
  </div>

<script>
(function () {
  'use strict';

  const $ = (id) => document.getElementById(id);

  // ─── 상태 ───────────────────────────────────────
  let audioCtx = null;
  let masterGain = null;
  let bpm = 100;
  let volume = 0.80;
  let isPlaying = false;
  let timerID = null;
  const notesInQueue = []; // { beat, sub, time, isDownbeat }
  const SCHEDULE_AHEAD = 0.1; // sec
  const LOOKAHEAD = 25; // ms

  // 박자(meter)
  const METERS = {
    '2/4': { beats: 2, downbeats: [0] },
    '3/4': { beats: 3, downbeats: [0] },
    '4/4': { beats: 4, downbeats: [0] },
    '5/4': { beats: 5, downbeats: [0] },
    '6/4': { beats: 6, downbeats: [0] },
    '7/4': { beats: 7, downbeats: [0] },
    '8/4': { beats: 8, downbeats: [0] },
    '6/8': { beats: 6, downbeats: [0, 3] },
  };
  let meterId = '4/4';
  function meter() { return METERS[meterId]; }
  function isDownbeat(i) { return meter().downbeats.indexOf(i) !== -1; }

  // 세분음(1~4)
  let subdivisions = 1;

  // 위치
  let currentBeat = 0;   // 0..beats-1
  let currentSub = 0;    // 0..subdivisions-1
  let nextNoteTime = 0;
  let lastDrawnBeat = -1;

  // 시각 플래시 강도 (0~10)
  let flashIntensity = 5;

  // 탭템포
  const tapTimes = []; // 최근 탭 시각 (performance.now)
  const TAP_KEEP = 6;
  const TAP_RESET_MS = 2000;

  // ─── 빠르기 이름 ────────────────────────────────
  const TEMPO_TABLE = [
    { name: 'Largo',    max: 60,  jump: 40 },
    { name: 'Adagio',   max: 76,  jump: 60 },
    { name: 'Andante',  max: 108, jump: 76 },
    { name: 'Moderato', max: 120, jump: 108 },
    { name: 'Allegro',  max: 156, jump: 120 },
    { name: 'Vivace',   max: 176, jump: 156 },
    { name: 'Presto',   max: 999, jump: 176 },
  ];
  function tempoEntry(b) {
    for (const t of TEMPO_TABLE) if (b < t.max) return t;
    return TEMPO_TABLE[TEMPO_TABLE.length - 1];
  }
  function tempoLabel(b) { return tempoEntry(b).name; }

  // ─── 박자 점 렌더링 ─────────────────────────────
  function renderBeats() {
    const root = $('beats');
    root.innerHTML = '';
    for (let i = 0; i < meter().beats; i++) {
      const d = document.createElement('div');
      d.className = 'dot' + (isDownbeat(i) ? ' downbeat' : '');
      d.dataset.idx = String(i);
      root.appendChild(d);
    }
    lastDrawnBeat = -1;
  }

  // ─── BPM ────────────────────────────────────────
  function setBpm(v, opts) {
    const next = Math.max(40, Math.min(208, Math.round(v)));
    if (Number.isNaN(next)) return;
    bpm = next;
    $('bpmValue').textContent = String(bpm);
    $('tempoName').textContent = tempoLabel(bpm);
    if (!opts || !opts.fromSlider) $('bpmSlider').value = String(bpm);
    if (!opts || !opts.fromInput)  $('bpmInput').value  = String(bpm);
  }

  function setMeter(id) {
    if (!METERS[id]) return;
    meterId = id;
    document.querySelectorAll('#meterGroup .segBtn').forEach((b) => {
      b.classList.toggle('active', b.dataset.meter === id);
    });
    currentBeat = 0;
    currentSub = 0;
    renderBeats();
  }

  function setSubdivisions(n) {
    subdivisions = Math.max(1, Math.min(4, Number(n) || 1));
    document.querySelectorAll('#subGroup .segBtn').forEach((b) => {
      b.classList.toggle('active', Number(b.dataset.sub) === subdivisions);
    });
    currentSub = 0;
  }

  // ─── Web Audio (iOS Safari 안전 unlock) ─────────
  let audioUnlocked = false;

  function updateDebug() {
    const el = document.getElementById('debugInfo');
    if (!el) return;
    const st = audioCtx ? audioCtx.state : 'null';
    el.textContent = 'audio: ' + st + ' · unlocked: ' + (audioUnlocked ? 'Y' : 'N');
  }

  // 핵심: 사용자 제스처 동기 흐름 안에서 audioCtx 생성 + 무음 버퍼 재생 + resume.
  // 절대 await 하지 말 것 (await 건너면 iOS는 unlock 신호 거부).
  function unlockAudio() {
    if (audioCtx) {
      // 이미 있으면 resume 만 보강
      if (audioCtx.state === 'suspended') {
        try { audioCtx.resume(); } catch (e) {}
      }
      updateDebug();
      return;
    }
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    try {
      audioCtx = new AC();
    } catch (e) {
      return;
    }

    // 1 sample 무음 버퍼 즉시 재생 (사용자 제스처 동기 호출)
    try {
      const buf = audioCtx.createBuffer(1, 1, 22050);
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      src.connect(audioCtx.destination);
      src.start(0);
    } catch (e) {}

    // 마스터 게인 (메트로놈용)
    try {
      masterGain = audioCtx.createGain();
      masterGain.gain.value = volume;
      masterGain.connect(audioCtx.destination);
    } catch (e) {}

    if (audioCtx.state === 'suspended') {
      try { audioCtx.resume(); } catch (e) {}
    }

    try { audioCtx.addEventListener('statechange', updateDebug); } catch (e) {}
    audioUnlocked = true;
    updateDebug();
  }

  // 페이지 어디든 첫 사용자 제스처에 한 번 발화 (글로벌 보험)
  document.addEventListener('touchstart', unlockAudio, { once: true, passive: true });
  document.addEventListener('touchend',   unlockAudio, { once: true, passive: true });
  document.addEventListener('mousedown',  unlockAudio, { once: true });
  document.addEventListener('click',      unlockAudio, { once: true });

  // start/startDrone 가 호출할 동기 ensureAudio (boilerplate)
  function ensureAudio() {
    if (!audioCtx) unlockAudio();
    if (audioCtx && audioCtx.state === 'suspended') {
      try { audioCtx.resume(); } catch (e) {}
    }
    updateDebug();
  }

  function setVolume(pct) {
    volume = Math.max(0, Math.min(1, pct / 100));
    $('volumeValue').textContent = Math.round(volume * 100) + '%';
    if ($('volumeSlider').value !== String(Math.round(volume * 100))) {
      $('volumeSlider').value = String(Math.round(volume * 100));
    }
    if (masterGain) masterGain.gain.setTargetAtTime(volume, audioCtx.currentTime, 0.01);
  }

  // 클릭음: downbeat / 메인박 / 세분음 차등
  function scheduleClick(beatIdx, subIdx, time) {
    if (!audioCtx || !masterGain) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(masterGain);

    const isMain = subIdx === 0;
    const isDown = isMain && isDownbeat(beatIdx);

    let freq, peak, duration;
    if (isDown)      { freq = 1600; peak = 1.00; duration = 0.06; osc.type = 'square'; }
    else if (isMain) { freq = 1100; peak = 0.70; duration = 0.05; osc.type = 'square'; }
    else             { freq = 800;  peak = 0.50; duration = 0.04; osc.type = 'triangle'; }

    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.0001, time);
    gain.gain.exponentialRampToValueAtTime(peak, time + 0.001);
    gain.gain.exponentialRampToValueAtTime(0.0001, time + duration);
    osc.start(time);
    osc.stop(time + duration + 0.02);

    notesInQueue.push({ beat: beatIdx, sub: subIdx, time, isDown });
  }

  function advance() {
    const secondsPerBeat = 60.0 / bpm;
    const secondsPerSub = secondsPerBeat / subdivisions;
    nextNoteTime += secondsPerSub;
    currentSub += 1;
    if (currentSub >= subdivisions) {
      currentSub = 0;
      currentBeat = (currentBeat + 1) % meter().beats;
    }
  }

  function scheduler() {
    if (!audioCtx) return;
    while (nextNoteTime < audioCtx.currentTime + SCHEDULE_AHEAD) {
      scheduleClick(currentBeat, currentSub, nextNoteTime);
      advance();
    }
  }

  // ─── 시각 갱신 ──────────────────────────────────
  function applyFlashVars() {
    const root = document.documentElement;
    const op = Math.min(0.8, flashIntensity * 0.08);
    const sc = Math.min(1.4, 1.0 + flashIntensity * 0.04);
    const gl = flashIntensity * 3;
    root.style.setProperty('--flash-opacity', String(op));
    root.style.setProperty('--flash-scale', String(sc));
    root.style.setProperty('--flash-glow', gl + 'px');
  }

  function setFlashIntensity(n) {
    flashIntensity = Math.max(0, Math.min(10, Number(n) | 0));
    $('flashValue').textContent = String(flashIntensity);
    if ($('flashSlider').value !== String(flashIntensity)) {
      $('flashSlider').value = String(flashIntensity);
    }
    applyFlashVars();
  }

  let wrapEl = null;
  function flashFire(isDown) {
    if (flashIntensity === 0) return;
    if (!wrapEl) wrapEl = document.querySelector('.wrap');
    // 클래스 reset 후 다음 프레임에 재적용 → fade out transition 재시작
    wrapEl.classList.remove('flash', 'downbeat-flash');
    void wrapEl.offsetWidth; // reflow
    wrapEl.classList.add('flash');
    if (isDown) wrapEl.classList.add('downbeat-flash');
    setTimeout(() => {
      wrapEl.classList.remove('flash', 'downbeat-flash');
    }, 30);
  }

  function draw() {
    if (!isPlaying) return;
    const now = audioCtx ? audioCtx.currentTime : 0;
    let pendingMain = null;
    while (notesInQueue.length && notesInQueue[0].time <= now) {
      const n = notesInQueue.shift();
      if (n.sub === 0) pendingMain = n; // 메인 박만 시각 처리
    }
    if (pendingMain) {
      const idx = pendingMain.beat;
      if (idx !== lastDrawnBeat) {
        lastDrawnBeat = idx;
        document.querySelectorAll('#beats .dot').forEach((d) => {
          d.classList.toggle('active', Number(d.dataset.idx) === idx);
        });
      }
      flashFire(pendingMain.isDown);
    }
    requestAnimationFrame(draw);
  }

  // ─── 재생 제어 ──────────────────────────────────
  function start() {
    ensureAudio();
    if (!audioCtx) return;
    isPlaying = true;
    currentBeat = 0;
    currentSub = 0;
    notesInQueue.length = 0;
    lastDrawnBeat = -1;
    nextNoteTime = audioCtx.currentTime + 0.06;
    timerID = setInterval(scheduler, LOOKAHEAD);
    requestAnimationFrame(draw);
    const btn = $('playBtn');
    btn.textContent = '정지';
    btn.classList.add('playing');
  }

  function stop() {
    isPlaying = false;
    if (timerID) { clearInterval(timerID); timerID = null; }
    notesInQueue.length = 0;
    document.querySelectorAll('#beats .dot').forEach((d) => d.classList.remove('active'));
    if (wrapEl) wrapEl.classList.remove('flash', 'downbeat-flash');
    const btn = $('playBtn');
    btn.textContent = '시작';
    btn.classList.remove('playing');
  }

  function toggle() { isPlaying ? stop() : start(); }

  // ─── 탭템포 ────────────────────────────────────
  function tapTempo() {
    const now = performance.now();
    const last = tapTimes[tapTimes.length - 1];
    if (last && now - last > TAP_RESET_MS) {
      tapTimes.length = 0; // 너무 오래 텀이 벌어지면 초기화
    }
    tapTimes.push(now);
    if (tapTimes.length > TAP_KEEP) tapTimes.shift();

    if (tapTimes.length >= 2) {
      let sum = 0;
      for (let i = 1; i < tapTimes.length; i++) sum += tapTimes[i] - tapTimes[i - 1];
      const avgMs = sum / (tapTimes.length - 1);
      const newBpm = 60000 / avgMs;
      setBpm(newBpm);
    }

    const btn = $('tapBtn');
    btn.classList.add('flashing');
    setTimeout(() => btn.classList.remove('flashing'), 90);
  }

  function resetTap() {
    // 배열 완전 비우기 (length = 0 으로 모든 요소 제거)
    tapTimes.length = 0;
    tapTimes.splice(0, tapTimes.length);

    // 시각 피드백: 초기화됨 토스트 + 버튼 깜빡임
    const btn = $('tapBtn');
    const original = btn.textContent;
    btn.classList.add('flashing');
    btn.textContent = '초기화됨';
    setTimeout(() => {
      btn.classList.remove('flashing');
      btn.textContent = original;
    }, 600);
  }

  // ─── BPM 직접 입력 ─────────────────────────────
  function openBpmInput() {
    const display = $('bpmValue');
    const input = $('bpmInput');
    display.style.display = 'none';
    input.style.display = '';
    input.value = String(bpm);
    setTimeout(() => { input.focus(); input.select(); }, 0);
  }
  function closeBpmInput(commit) {
    const display = $('bpmValue');
    const input = $('bpmInput');
    if (commit) {
      const v = Number(input.value);
      if (!Number.isNaN(v) && v > 0) setBpm(v, { fromInput: true });
    }
    input.style.display = 'none';
    display.style.display = '';
  }


  // ─── 이벤트 바인딩 ─────────────────────────────
  $('playBtn').addEventListener('click', toggle);
  $('inc1').addEventListener('click', () => setBpm(bpm + 1));
  $('dec1').addEventListener('click', () => setBpm(bpm - 1));
  $('inc10').addEventListener('click', () => setBpm(bpm + 10));
  $('dec10').addEventListener('click', () => setBpm(bpm - 10));
  $('bpmSlider').addEventListener('input', (e) => setBpm(Number(e.target.value), { fromSlider: true }));

  $('bpmValue').addEventListener('click', openBpmInput);
  $('bpmInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); closeBpmInput(true); }
    else if (e.key === 'Escape') { e.preventDefault(); closeBpmInput(false); }
  });
  $('bpmInput').addEventListener('blur', () => closeBpmInput(true));

  $('tempoName').addEventListener('click', () => setBpm(tempoEntry(bpm).jump));

  $('volumeSlider').addEventListener('input', (e) => {
    ensureAudio();
    setVolume(Number(e.target.value));
  });

  $('tapBtn').addEventListener('click', tapTempo);
  $('resetTapBtn').addEventListener('click', resetTap);

  document.querySelectorAll('#subGroup .segBtn').forEach((b) => {
    b.addEventListener('click', () => setSubdivisions(Number(b.dataset.sub)));
  });
  document.querySelectorAll('#meterGroup .segBtn').forEach((b) => {
    b.addEventListener('click', () => setMeter(b.dataset.meter));
  });

  $('flashSlider').addEventListener('input', (e) => setFlashIntensity(Number(e.target.value)));

  // 키보드 단축키 (input 포커스 중에는 화살표/스페이스는 input이 가져감)
  function isTypingTarget(el) {
    if (!el) return false;
    const tag = el.tagName;
    return tag === 'INPUT' || tag === 'TEXTAREA' || el.isContentEditable;
  }
  window.addEventListener('keydown', (e) => {
    const typing = isTypingTarget(e.target);
    const step = e.shiftKey ? 5 : 1;

    // T 는 입력 중이 아닐 때만
    if (!typing && (e.key === 't' || e.key === 'T')) {
      e.preventDefault();
      tapTempo();
      return;
    }
    if (typing) return; // 나머지는 입력 중이면 무시

    if (e.code === 'Space') {
      e.preventDefault();
      toggle();
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      setBpm(bpm + step);
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      setBpm(bpm - step);
    }
  });

  // ─── 드론 음 ────────────────────────────────────
  const STRING_FREQS = {
    low:  { E: 41.20,  A: 55.00,  D: 73.42,  G: 98.00  },
    mid:  { E: 82.41,  A: 110.00, D: 146.83, G: 196.00 },
    high: { E: 164.81, A: 220.00, D: 293.66, G: 392.00 },
  };

  // 표준 배음 패턴
  const HARM_STD  = [
    { ratio: 1, gain: 1.00 }, { ratio: 2, gain: 0.50 },
    { ratio: 3, gain: 0.25 }, { ratio: 4, gain: 0.12 }, { ratio: 5, gain: 0.06 },
  ];
  // 중-저음 보정 (기본음 살짝 누르고 2배음 살림)
  const HARM_MID  = [
    { ratio: 1, gain: 0.70 }, { ratio: 2, gain: 0.70 },
    { ratio: 3, gain: 0.35 }, { ratio: 4, gain: 0.15 }, { ratio: 5, gain: 0.08 },
  ];
  // 매우 저음(E1, A1): 기본음 0.4, 2배음 1.0, 3배음 0.6 — 스피커 재생대역 강조
  const HARM_DEEP = [
    { ratio: 1, gain: 0.40 }, { ratio: 2, gain: 1.00 },
    { ratio: 3, gain: 0.60 }, { ratio: 4, gain: 0.20 }, { ratio: 5, gain: 0.10 },
  ];

  // 옥타브 × 현 → { 사용할 배음 패턴, 마스터 boost 배수 }
  const STRING_PROFILE = {
    low: {
      E: { harm: HARM_DEEP, boost: 3.0 }, // E1 41Hz
      A: { harm: HARM_DEEP, boost: 2.5 }, // A1 55Hz
      D: { harm: HARM_MID,  boost: 1.8 }, // D2 73Hz
      G: { harm: HARM_MID,  boost: 1.3 }, // G2 98Hz
    },
    mid: {
      E: { harm: HARM_MID, boost: 2.0 }, // E2 82Hz
      A: { harm: HARM_MID, boost: 1.5 }, // A2 110Hz
      D: { harm: HARM_STD, boost: 1.2 }, // D3 147Hz
      G: { harm: HARM_STD, boost: 1.0 }, // G3 196Hz
    },
    high: {
      E: { harm: HARM_STD, boost: 1.0 },
      A: { harm: HARM_STD, boost: 1.0 },
      D: { harm: HARM_STD, boost: 1.0 },
      G: { harm: HARM_STD, boost: 1.0 },
    },
  };

  // 드론 마스터(boost 곱 위해 게인 곱 작게) — 합산·boost 클리핑 방지 위해 compressor 거침
  const DRONE_BASE_GAIN = 0.10;

  let droneOctave = 'mid';
  let droneTimbre = 'bass';
  let droneVolume = 1.00;
  let droneOutput = null;
  let droneCompressor = null;
  const activeDrones = new Map(); // stringId → nodes

  function ensureDroneOutput() {
    if (!audioCtx) return;
    if (droneOutput) return;
    droneOutput = audioCtx.createGain();
    droneOutput.gain.value = 1.0;
    // 보정 boost로 인한 클리핑 방지
    droneCompressor = audioCtx.createDynamicsCompressor();
    droneCompressor.threshold.value = -10;
    droneCompressor.knee.value = 8;
    droneCompressor.ratio.value = 6;
    droneCompressor.attack.value = 0.003;
    droneCompressor.release.value = 0.1;
    droneOutput.connect(droneCompressor);
    droneCompressor.connect(audioCtx.destination);
  }

  function makeTimbreFilter(ctx, timbre) {
    if (timbre === 'clean') return null;
    const f = ctx.createBiquadFilter();
    if (timbre === 'bass') {
      f.type = 'lowshelf';
      f.frequency.value = 200;
      f.gain.value = 8; // +8dB
    } else if (timbre === 'warm') {
      f.type = 'lowpass';
      f.frequency.value = 800;
      f.Q.value = 0.8;
    }
    return f;
  }

  function startDrone(stringId) {
    ensureAudio();
    if (!audioCtx) return;
    // 보강: 매 터치마다 resume 명시 호출 (iOS Safari)
    if (audioCtx.state === 'suspended') {
      try { audioCtx.resume(); } catch (e) {}
    }
    ensureDroneOutput();
    if (activeDrones.has(stringId)) return;

    const fundamental = STRING_FREQS[droneOctave][stringId];
    if (!fundamental) return;
    const profile = STRING_PROFILE[droneOctave][stringId];
    const harmonics = profile.harm;
    const boost = profile.boost;

    const now = audioCtx.currentTime;

    // 1) 배음 합성 (string·옥타브별 패턴 적용)
    const mixer = audioCtx.createGain();
    mixer.gain.value = 1;
    const oscList = [];
    const harmGains = [];
    harmonics.forEach((h) => {
      const osc = audioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = fundamental * h.ratio;
      const g = audioCtx.createGain();
      g.gain.value = h.gain;
      osc.connect(g);
      g.connect(mixer);
      osc.start(now);
      oscList.push(osc);
      harmGains.push(g);
    });

    // 2) 음색 필터
    let preEnv = mixer;
    const filter = makeTimbreFilter(audioCtx, droneTimbre);
    if (filter) {
      mixer.connect(filter);
      preEnv = filter;
    }

    // 3) ADSR envelope: attack 10ms → decay 150ms → sustain 0.7
    const envelope = audioCtx.createGain();
    envelope.gain.setValueAtTime(0, now);
    envelope.gain.linearRampToValueAtTime(1.0, now + 0.01);
    envelope.gain.linearRampToValueAtTime(0.7, now + 0.01 + 0.15);
    preEnv.connect(envelope);

    // 4) 드론 마스터 (볼륨 × boost) → compressor → destination
    const droneMaster = audioCtx.createGain();
    droneMaster.gain.value = droneVolume * DRONE_BASE_GAIN * boost;
    envelope.connect(droneMaster);
    droneMaster.connect(droneOutput);

    activeDrones.set(stringId, { oscList, harmGains, mixer, filter, envelope, droneMaster, boost });

    const btn = document.querySelector('.stringBtn[data-string="' + stringId + '"]');
    if (btn) btn.classList.add('playing');
  }

  function stopDrone(stringId) {
    const drone = activeDrones.get(stringId);
    if (!drone) return;
    activeDrones.delete(stringId);

    const now = audioCtx.currentTime;
    // Release 250ms (현재 게인에서 0으로 선형)
    const env = drone.envelope.gain;
    env.cancelScheduledValues(now);
    env.setValueAtTime(env.value, now);
    env.linearRampToValueAtTime(0, now + 0.25);

    // release 끝나면 오실레이터 stop + disconnect
    drone.oscList.forEach((o) => { try { o.stop(now + 0.27); } catch (e) {} });
    setTimeout(() => {
      drone.oscList.forEach((o) => { try { o.disconnect(); } catch (e) {} });
      try { drone.mixer.disconnect(); } catch (e) {}
      if (drone.filter) { try { drone.filter.disconnect(); } catch (e) {} }
      try { drone.envelope.disconnect(); } catch (e) {}
      try { drone.droneMaster.disconnect(); } catch (e) {}
    }, 320);

    const btn = document.querySelector('.stringBtn[data-string="' + stringId + '"]');
    if (btn) btn.classList.remove('playing');
  }

  function stopAllDrones() {
    for (const id of Array.from(activeDrones.keys())) stopDrone(id);
  }

  function setDroneVolume(pct) {
    droneVolume = Math.max(0, Math.min(1, pct / 100));
    $('droneVolumeValue').textContent = Math.round(droneVolume * 100) + '%';
    if ($('droneVolumeSlider').value !== String(Math.round(droneVolume * 100))) {
      $('droneVolumeSlider').value = String(Math.round(droneVolume * 100));
    }
    if (audioCtx) {
      const now = audioCtx.currentTime;
      for (const drone of activeDrones.values()) {
        drone.droneMaster.gain.setTargetAtTime(droneVolume * DRONE_BASE_GAIN * drone.boost, now, 0.02);
      }
    }
  }

  function setDroneOctave(oct) {
    if (!STRING_FREQS[oct]) return;
    droneOctave = oct;
    document.querySelectorAll('#droneOctave .segBtn').forEach((b) => {
      b.classList.toggle('active', b.dataset.octave === oct);
    });
    // 활성 음의 주파수·배음 게인·boost 모두 갱신
    if (audioCtx) {
      const now = audioCtx.currentTime;
      for (const [id, drone] of activeDrones.entries()) {
        const f = STRING_FREQS[oct][id];
        const profile = STRING_PROFILE[oct][id];
        if (!f || !profile) continue;
        drone.oscList.forEach((osc, i) => {
          osc.frequency.setTargetAtTime(f * profile.harm[i].ratio, now, 0.02);
        });
        drone.harmGains.forEach((g, i) => {
          g.gain.setTargetAtTime(profile.harm[i].gain, now, 0.02);
        });
        drone.boost = profile.boost;
        drone.droneMaster.gain.setTargetAtTime(droneVolume * DRONE_BASE_GAIN * profile.boost, now, 0.02);
      }
    }
  }

  function setDroneTimbre(t) {
    droneTimbre = t;
    document.querySelectorAll('#droneTimbre .segBtn').forEach((b) => {
      b.classList.toggle('active', b.dataset.timbre === t);
    });
    // 활성 음은 다음 누름부터 새 음색 적용 (필터 동적 교체는 click 노이즈 위험)
  }

  // 현 버튼: 누르는 동안 재생
  document.querySelectorAll('.stringBtn').forEach((btn) => {
    const id = btn.dataset.string;
    const begin = (e) => { e.preventDefault(); startDrone(id); };
    const end = (e) => { if (e && e.cancelable) e.preventDefault(); stopDrone(id); };
    btn.addEventListener('mousedown', begin);
    btn.addEventListener('mouseup', end);
    btn.addEventListener('mouseleave', end);
    btn.addEventListener('touchstart', begin, { passive: false });
    btn.addEventListener('touchend', end);
    btn.addEventListener('touchcancel', end);
  });
  document.querySelectorAll('#droneOctave .segBtn').forEach((b) => {
    b.addEventListener('click', () => setDroneOctave(b.dataset.octave));
  });
  document.querySelectorAll('#droneTimbre .segBtn').forEach((b) => {
    b.addEventListener('click', () => setDroneTimbre(b.dataset.timbre));
  });
  $('droneVolumeSlider').addEventListener('input', (e) => {
    ensureAudio();
    setDroneVolume(Number(e.target.value));
  });

  // ─── 탭 전환 ────────────────────────────────────
  function switchTab(name) {
    // 다른 탭으로 가면 해당 탭 사운드 정지
    if (name !== 'metronome' && isPlaying) stop();
    if (name !== 'drone') stopAllDrones();

    document.querySelectorAll('.tab').forEach((t) => {
      const on = t.dataset.tab === name;
      t.classList.toggle('active', on);
      t.setAttribute('aria-selected', on ? 'true' : 'false');
    });
    document.querySelectorAll('.panel').forEach((p) => {
      p.hidden = p.id !== ('panel-' + name);
    });
  }
  document.querySelectorAll('.tab').forEach((t) => {
    t.addEventListener('click', () => switchTab(t.dataset.tab));
  });

  // 닫기
  function closeMe() {
    stop();
    stopAllDrones();
    try { window.parent.postMessage('close-metronome', window.location.origin); } catch (e) {}
  }
  $('closeBtn').addEventListener('click', closeMe);

  // 페이지 벗어날 때 정리
  function cleanup() { stop(); stopAllDrones(); }
  window.addEventListener('pagehide', cleanup);
  window.addEventListener('beforeunload', cleanup);

  // 초기 렌더
  renderBeats();
  setBpm(bpm);
  setVolume(Math.round(volume * 100));
  setFlashIntensity(flashIntensity);
})();
</script>
</body>
</html>
