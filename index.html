<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <!-- 카카오톡 인앱 브라우저로 열렸을 때 기기 기본 브라우저로 자동 전환.
         인앱(WebView)에서는 PWA 설치가 막히고 일부 연결이 제약되므로, React 번들을
         받기 전에 가장 먼저 외부 브라우저로 내보낸다. 처리할 앱이 없거나 실패하면
         현재 페이지가 그대로 유지되어 인앱에서도 계속 사용할 수 있다. -->
    <script>
      (function () {
        try {
          var ua = navigator.userAgent || '';
          // 카톡 인앱에서만, 같은 세션 1회만 시도(전환 실패 시 무한 재시도 방지)
          if (/KAKAOTALK/i.test(ua) && !sessionStorage.getItem('kakao-external-tried')) {
            sessionStorage.setItem('kakao-external-tried', '1');
            location.href = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(location.href);
          }
        } catch (e) {
          /* sessionStorage/스킴 미지원 등 — 무시하고 인앱에서 계속 진행 */
        }
      })();
    </script>
    <link rel="icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <title>SY Music - 수영로말씀적용찬양</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css"
    />
    <meta
      name="description"
      content="수영로교회 말씀적용찬양 음악플레이어"
    />
    <meta name="author" content="수영로교회" />
    <meta property="og:title" content="SY Music - 수영로말씀적용찬양 음악플레이어" />
    <meta
      property="og:description"
      content="수영로교회 말씀적용찬양 음악플레이어"
    />
    <meta property="og:type" content="website" />
    <!-- PWA 설정 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#8b5cf6">
    
    <!-- iOS 지원 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SY Music">
    <link rel="apple-touch-icon" href="/android/android-launchericon-192-192.png">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Service Worker 등록 -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => console.log('SW 등록 성공:', reg.scope))
            .catch((err) => console.log('SW 등록 실패:', err));
        });
      }
    </script>
  </body>
</html>
